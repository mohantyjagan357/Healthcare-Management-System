<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>HMS - Patients</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <style>
        body{font-family: Arial, sans-serif; max-width:900px;margin:24px auto;padding:0 12px;}
        h1,h2{color:#2c3e50}
        form {background:#f7f9fb;padding:16px;border-radius:6px;margin-bottom:16px}
        label{display:block;margin:8px 0 4px;font-weight:600}
        input,button,select{padding:8px;font-size:14px;width:100%;box-sizing:border-box}
        .row{display:flex;gap:12px}
        .col{flex:1}
        table{width:100%;border-collapse:collapse;margin-top:8px}
        th,td{padding:8px;border:1px solid #e2e8f0;text-align:left}
        .muted{color:#6b7280;font-size:13px}
        .small{font-size:13px}
    </style>
</head>
<body>
<h1>Hospital Management — Patients</h1>

<section>
    <h2>Create Patient</h2>
    <form id="patientForm">
        <label for="name">Full name</label>
        <input id="name" name="name" required placeholder="John Doe">

        <label for="address">Address</label>
        <input id="address" name="address" placeholder="123 Main St">

        <div class="row">
            <div class="col">
                <label for="contact">Contact</label>
                <input id="contact" name="contact" placeholder="+911234567890">
            </div>
            <div class="col">
                <label for="dob">Date of birth</label>
                <input id="dob" name="dob" type="date">
            </div>
        </div>

        <div style="margin-top:12px">
            <button type="submit">Create Patient</button>
        </div>
    </form>

    <div id="patientMsg" class="muted small"></div>
</section>

<section>
    <h2>Existing Patients</h2>
    <div id="patientsContainer">
        <div class="muted">Loading patients…</div>
    </div>
</section>

<script>
    const apiBase = '/api';

    // helper to format dates
    function formatDate(d) {
      if(!d) return '';
      const dt = new Date(d);
      return dt.toLocaleDateString();
    }

    async function fetchPatients() {
      const res = await fetch(`${apiBase}/patients`);
      if(!res.ok) {
        document.getElementById('patientsContainer').innerHTML = '<div class="muted">Failed to load patients</div>';
        return;
      }
      const patients = await res.json();
      renderPatients(patients);
    }

    function renderPatients(patients) {
      if (!patients || patients.length === 0) {
        document.getElementById('patientsContainer').innerHTML = '<div class="muted">No patients found.</div>';
        return;
      }

      const rows = patients.map(p => `
        <tr>
          <td>${p.id ?? ''}</td>
          <td>${escapeHtml(p.name ?? '')}</td>
          <td>${escapeHtml(p.contact ?? '')}</td>
          <td>${escapeHtml(p.address ?? '')}</td>
          <td>${p.dob ? formatDate(p.dob) : ''}</td>
        </tr>
      `).join('');

      document.getElementById('patientsContainer').innerHTML = `
        <table>
          <thead><tr><th>ID</th><th>Name</th><th>Contact</th><th>Address</th><th>DOB</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      `;
    }

    // basic HTML escape to avoid injection
    function escapeHtml(s){
      return String(s).replace(/[&<>"']/g, (m) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
    }

    document.getElementById('patientForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('name').value.trim();
      const address = document.getElementById('address').value.trim();
      const contact = document.getElementById('contact').value.trim();
      const dob = document.getElementById('dob').value || null; // yyyy-mm-dd

      if (!name) {
        showMsg('Name is required', true);
        return;
      }

      const payload = { name, address, contact, dob };

      try {
        const res = await fetch(`${apiBase}/patients`, {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify(payload)
        });
        if (!res.ok) {
          const text = await res.text();
          showMsg('Failed to create patient: ' + text, true);
          return;
        }
        const created = await res.json();
        showMsg('Patient created (ID: ' + created.id + ')');
        document.getElementById('patientForm').reset();
        fetchPatients();
      } catch (err) {
        showMsg('Network or server error: ' + err.message, true);
      }
    });

    function showMsg(text, isError=false) {
      const el = document.getElementById('patientMsg');
      el.textContent = text;
      el.style.color = isError ? '#b91c1c' : '#065f46';
      setTimeout(()=>el.textContent='', 6000);
    }

    // Initial load
    fetchPatients();
</script>
</body>
</html>
